<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Transfer Encrypt Layui Upload Demo</title>
  <link rel="stylesheet" href="./vendor/layui/layui.css">
</head>
<body style="padding: 24px;">
  <div class="layui-card">
    <div class="layui-card-header">Layui Upload + MD5 完整性校验</div>
    <div class="layui-card-body">
      <button type="button" class="layui-btn" id="pickFile">选择文件</button>
      <button type="button" class="layui-btn layui-btn-normal" id="startUpload">开始上传</button>
      <div id="fileInfo" style="margin-top: 12px; color: #666;"></div>
    </div>
  </div>

  <script src="./vendor/layui/layui.js"></script>
  <script src="../vendor/sm-crypto.min.js"></script>
  <script src="../transfer-encrypt.js"></script>
  <script>
    TransferEncryptRegisterSmCrypto(window.smCrypto);

    layui.use(['upload', 'layer'], function () {
      var layer = layui.layer;
      var upload = layui.upload;
      var selectedFile = null;

      var adapter = TransferEncryptCreateLayuiAdapter({
        layui: layui,
        baseUrl: 'http://localhost:8080',
        publicKey: '请替换成服务端SM2公钥'
      });

      upload.render({
        elem: '#pickFile',
        auto: false,
        choose: function (obj) {
          obj.preview(function (index, file) {
            selectedFile = file;
            document.getElementById('fileInfo').textContent =
              '已选择文件：' + file.name + '，大小：' + file.size + ' 字节';
          });
        }
      });

      document.getElementById('startUpload').addEventListener('click', async function () {
        if (!selectedFile) {
          layer.msg('请先选择文件', { icon: 0 });
          return;
        }
        try {
          var response = await adapter.upload(selectedFile, {
            url: '/api/upload',
            fieldName: 'file',
            data: {
              bizType: 'layui-upload-demo'
            },
            successMessage: '上传完成'
          });
          layer.alert(JSON.stringify(response), { title: '上传响应' });
        } catch (error) {
          console.error(error);
        }
      });
    });
  </script>
</body>
</html>
