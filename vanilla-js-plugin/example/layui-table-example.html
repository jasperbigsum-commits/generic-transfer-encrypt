<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Layui Table Encrypt Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./vendor/layui/dist/css/layui.css">
</head>
<body class="layui-padding-3">
<fieldset class="layui-elem-field layui-field-title">
  <legend>Layui Table 自动加密桥接示例</legend>
</fieldset>

<div class="layui-card">
  <div class="layui-card-body">
    <table class="layui-hide" id="encrypt-table"></table>
  </div>
</div>

<script src="./vendor/layui/dist/layui.js"></script>
<script src="./vendor/md5.js"></script>
<script src="./vendor/sm-crypto.min.js"></script>
<script src="./transfer-encrypt.js"></script>
<script>
  TransferEncryptRegisterSmCrypto(window.smCrypto);

  layui.use(['table'], function () {
    var table = layui.table;
    var adapter = TransferEncryptCreateLayuiAdapter({
      layui: layui,
      baseUrl: 'http://localhost:8080',
      publicKey: '服务端SM2公钥'
    });

    adapter.installTableBridge();

    table.render({
      elem: '#encrypt-table',
      url: '/api/table',
      method: 'GET',
      where: { keyword: 'alice' },
      cols: [[
        { field: 'id', title: 'ID', width: 120 },
        { field: 'name', title: '姓名', minWidth: 180 }
      ]]
    });
  });
</script>
</body>
</html>
