<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Transfer Encrypt Layui Demo</title>
  <link rel="stylesheet" href="./vendor/layui/dist/css/layui.css">
</head>
<body style="padding: 24px;">
  <form class="layui-form" lay-filter="encrypt-demo">
    <div class="layui-form-item">
      <label class="layui-form-label">名称</label>
      <div class="layui-input-block">
        <input type="text" name="name" required lay-verify="required" placeholder="请输入名称" autocomplete="off" class="layui-input">
      </div>
    </div>
    <div class="layui-form-item">
      <div class="layui-input-block">
        <button class="layui-btn" lay-submit lay-filter="encrypt-submit">加密提交</button>
      </div>
    </div>
  </form>

  <script src="./vendor/layui/dist/layui.js"></script>
  <script src="../vendor/md5.js"></script>
  <script src="../vendor/sm-crypto.min.js"></script>
  <script src="../transfer-encrypt.js"></script>
  <script>
    TransferEncryptRegisterSmCrypto(window.smCrypto);

    layui.use(['form', 'layer'], function () {
      var adapter = TransferEncryptCreateLayuiAdapter({
        layui: layui,
        baseUrl: 'http://localhost:8080',
        publicKey: '请替换成服务端SM2公钥'
      });

      adapter.bindFormSubmit('encrypt-submit', {
        url: '/api/form',
        form: true,
        successMessage: '提交成功',
        onSuccess: function (response) {
          layui.layer.alert(JSON.stringify(response), { title: '响应结果' });
        }
      });
    });
  </script>
</body>
</html>
